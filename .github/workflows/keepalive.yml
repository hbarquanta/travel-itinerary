name: Keep Supabase Awake

on:
  schedule:
    - cron: '0 8 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query trips table to register API activity
        run: |
          curl -sf "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/trips?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -o /dev/null
